<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Memory Game</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- import jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="index.js"></script>
  </head>

  <body>
    <main class="container text-center py-5">
      <h1 id="game_title" class="display-3 fw-bold mb-5">
        Pokemon Memory Game
      </h1>

      <div id="controls" class="mb-4">
        <button id="easy_btn" class="btn btn-outline-primary difficulty_btn selected">
          Easy
        </button>
        <button id="medium_btn" class="btn btn-outline-primary difficulty_btn">
          Medium
        </button>
        <button id="hard_btn" class="btn btn-outline-primary difficulty_btn">
          Hard
        </button>
        <button id="start_btn" class="btn btn-success">Start</button>
        <button id="reset_btn" class="btn btn-secondary">Reset</button>
        <button id="powerup_btn" class="btn btn-warning">Peek Power-Up</button>
      </div>

      <header id="status_header" class="mb-4">
        <p>Total Number of Pairs: <span id="total_pairs">3</span></p>
        <p>Number of Matches: <span id="matches">0</span></p>
        <p>Number of Pairs Left: <span id="pairs_left">3</span></p>
        <p>Number of Clicks: <span id="clicks">0</span></p>
        <p>You have <span id="total_time">100</span> seconds total.</p>
        <p>Time Remaining: <span id="time_left">100</span></p>
        <h2 id="message"></h2>
      </header>

      <div id="game_grid"></div>

      <div id="theme_controls" class="mt-3">
        <button id="dark_btn" class="btn btn-dark">Dark</button>
        <button id="light_btn" class="btn btn-light border">Light</button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
